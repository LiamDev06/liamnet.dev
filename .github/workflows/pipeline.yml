name: CI / Deploy

on:
  push:
    branches: ["**"]
    paths:
      - "liamnet-app/**"
      - "liamnet-server/**"
      - "liamnet-api/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/pipeline.yml"
  pull_request:
    paths:
      - "liamnet-app/**"
      - "liamnet-server/**"
      - "liamnet-api/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/pipeline.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-test-frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: liamnet-app/package-lock.json

      - name: Install dependencies
        working-directory: liamnet-app
        run: npm ci

      - name: Lint, typecheck, format check
        working-directory: liamnet-app
        run: npm run check

  lint-test-backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v3

      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Test
        run: ./gradlew :liamnet-server:test --no-daemon

  build-and-push:
    name: Build & push Docker images to ECR
    runs-on: ubuntu-latest
    needs: [lint-test-frontend, lint-test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build server JAR
        run: ./gradlew :liamnet-server:bootJar --no-daemon -x test

      - name: Build and push liamnet-server
        env:
          ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f liamnet-server/Dockerfile \
            -t $ECR_REGISTRY/liamnet-server:$IMAGE_TAG \
            -t $ECR_REGISTRY/liamnet-server:latest \
            .
          docker push $ECR_REGISTRY/liamnet-server:$IMAGE_TAG
          docker push $ECR_REGISTRY/liamnet-server:latest

      - name: Build and push liamnet-app
        env:
          ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f liamnet-app/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.liamnet.dev \
            -t $ECR_REGISTRY/liamnet-app:$IMAGE_TAG \
            -t $ECR_REGISTRY/liamnet-app:latest \
            .
          docker push $ECR_REGISTRY/liamnet-app:$IMAGE_TAG
          docker push $ECR_REGISTRY/liamnet-app:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          aws ssm put-parameter \
            --name /liamnet/docker-compose-prod \
            --value "$(cat docker-compose.prod.yml)" \
            --type String \
            --overwrite

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["set -a && source /opt/liamnet/.env && set +a && aws ssm get-parameter --name /liamnet/docker-compose-prod --region eu-north-1 --query Parameter.Value --output text > /opt/liamnet/docker-compose.prod.yml && aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin $ECR_REGISTRY && cd /opt/liamnet && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d --remove-orphans"]' \
            --output text \
            --query Command.CommandId)

          echo "Waiting for deploy command $COMMAND_ID..."
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --output text \
              --query Status)
            echo "[$i/36] $STATUS"
            case "$STATUS" in
              Success) echo "Deploy succeeded"; exit 0 ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query StandardErrorContent \
                  --output text
                exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          echo "Deploy timed out after 6 minutes"
          exit 1
