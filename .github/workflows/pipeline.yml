name: CI / Deploy

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test-frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: liamnet-app/package-lock.json

      - name: Install dependencies
        working-directory: liamnet-app
        run: npm ci

      - name: Lint, typecheck, format check
        working-directory: liamnet-app
        run: npm run check

  lint-test-backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v3

      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Test
        run: ./gradlew :liamnet-server:test --no-daemon

  build-and-push:
    name: Build & push Docker images to ECR
    runs-on: ubuntu-latest
    needs: [lint-test-frontend, lint-test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build server JAR
        run: ./gradlew :liamnet-server:bootJar --no-daemon -x test

      - name: Build and push liamnet-server
        env:
          ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f liamnet-server/Dockerfile \
            -t $ECR_REGISTRY/liamnet-server:$IMAGE_TAG \
            -t $ECR_REGISTRY/liamnet-server:latest \
            .
          docker push $ECR_REGISTRY/liamnet-server:$IMAGE_TAG
          docker push $ECR_REGISTRY/liamnet-server:latest

      - name: Build and push liamnet-app
        env:
          ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f liamnet-app/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.liamnet.dev \
            -t $ECR_REGISTRY/liamnet-app:$IMAGE_TAG \
            -t $ECR_REGISTRY/liamnet-app:latest \
            .
          docker push $ECR_REGISTRY/liamnet-app:$IMAGE_TAG
          docker push $ECR_REGISTRY/liamnet-app:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            docker-compose.prod.yml \
            ubuntu@$EC2_HOST:/opt/liamnet/docker-compose.prod.yml

          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ubuntu@$EC2_HOST \
            "set -a && source /opt/liamnet/.env && set +a && \
             aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin \$ECR_REGISTRY && \
             cd /opt/liamnet && \
             docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans"

          rm -f /tmp/deploy_key
