server {
    listen 80;
    server_name liamnet.dev www.liamnet.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name liamnet.dev www.liamnet.dev;

    ssl_certificate /etc/letsencrypt/live/liamnet.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liamnet.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /health {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.liamnet.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.liamnet.dev;

    ssl_certificate /etc/letsencrypt/live/api.liamnet.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.liamnet.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /actuator {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
